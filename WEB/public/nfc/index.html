<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tapfolio - Connect</title>
  <!-- Google Fonts: Outfit & Yellowtail for cursive signature -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Yellowtail&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Phone Preview Wrapper for Desktop, behaves natively on Mobile -->
  <div class="phone-frame">
    <div class="phone-screen">

      <!-- Scrollable App Content -->
      <div class="app-content">

        <!-- App Header (Logo & Points) -->
        <header class="app-header">
          <div class="logo-area">
            <div class="logo-icon">t</div>
            <span class="logo-text">tapfolio</span>
          </div>
          <div class="points-badge" id="diamonds-badge">
            <span class="points-icon">💎</span>
            <span class="points-count" id="diamonds-count">12000</span>
            <button class="points-plus" id="btn-increment-points">
              <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"
                stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </button>
          </div>
        </header>

        <!-- Greeting & Name CTA -->
        <section class="intro-section">
          <p class="intro-greeting">👋 Hey, i am</p>
          <h1 class="profile-name" id="preview-name">Abhinand</h1>
          <h2 class="intro-cta" id="preview-tagline-cta">
            Let's connect!
            <svg class="hand-underline" viewBox="0 0 100 10" preserveAspectRatio="none">
              <path d="M5,5 Q50,9 95,5" fill="none" stroke="#0052ff" stroke-width="2.5" stroke-linecap="round" />
            </svg>
          </h2>
        </section>

        <!-- Profile Detail Section (Avatar on left, tags stacked on right) -->
        <section class="profile-detail-section">
          <div class="avatar-column">
            <div class="avatar-ring">
              <img id="preview-avatar"
                src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2E3OGJmYSIgd2lkdGg9IjQ4IiBoZWlnaHQ9IjQ4Ij48cGF0aCBkPSJNMTIgMkM2LjQ4IDIgMiA2LjQ4IDIgMTJzNC40OCAxMCAxMCAxMCAxMC00LjQ4IDEwLTEwUzE3LjUyIDIgMTIgMnptMCAzYzEuNjYgMCAzIDEuMzQgMyAzcy0xLjM0IDMtMyAzLTMtMS4zNC0zLTNzMS4zNC0zIDMtM3ptMCAxNC4yYy0yLjUgMC00LjcxLTEuMjgtNi0zLjIyLjAzLTEuOTkgNC0zLjA4IDYtMy4wOCAxLjk5IDAgNS45NyAxLW9jIDYgMy4wOC0xLjI5IDEuOTQtMy41IDMuMjItNiAzLjIyeiIvPjwvc3ZnPg=="
                alt="Profile photo">
              <div class="status-indicator pulse-animation"></div>
            </div>
          </div>
          <div class="tags-column" id="preview-tags">
            <!-- Dynamically populated vertical stacked tags -->
          </div>
        </section>

        <!-- Bio paragraph -->
        <section class="bio-section">
          <p class="bio-text" id="preview-bio">
            <!-- Dynamically populated bio with highlight functionality -->
          </p>
        </section>

        <!-- Connect Divider -->
        <div class="connect-divider">
          <span class="divider-dot">···</span>
          <span class="divider-text">Connect with me</span>
          <span class="divider-dot">···</span>
        </div>

        <!-- Social List -->
        <section class="socials-section">
          <div class="socials-list" id="preview-socials-grid">
            <!-- Dynamically populated social link cards -->
          </div>
        </section>

        <!-- Signature Quote Card -->
        <section class="quote-section">
          <div class="quote-card" id="preview-quote-card" style="display: none;">
            <div class="quote-icon">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z" />
              </svg>
            </div>
            <p class="quote-body" id="preview-quote-text">Design is not just what it looks like, it's how it connects.
            </p>
            <div class="quote-signature-row">
              <span class="quote-signature" id="preview-quote-author">Abhinand</span>
            </div>
          </div>
        </section>

      </div> <!-- End app-content -->

    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
